<!DOCTYPE html>
<html lang="ca">

<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sports Arena | Quiz</title>
    <link rel="icon" href="img/favicon.png">
    <link rel="stylesheet" href="css/styles.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="bg-glow"></div>
    <div class="bg-grid"></div>

    <main class="main-wrapper">
        <section id="screen-welcome" class="active">
            <div class="glass-card">
                <h1>SPORTS<span> ARENA</span></h1>
                <p>Domina la pista i els eSports en el duel definitiu.</p>

                <div class="input-container">
                    <input type="text" id="username" placeholder="El teu nom de jugador..." autocomplete="off">
                </div>
                <button class="btn-main" onclick="checkUser()">INICIAR SESSIÓ</button>
            </div>
        </section>

        <section id="screen-select">
            <div class="top-bar">
                <button class="btn-back" onclick="goBack()" aria-label="Tornar">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                </button>
            </div>

            <div class="glass-card selection-box">
                <h2 id="welcome-user">Hola, (NOM JUGADOR)</h2>
                <p>Selecciona el teu camp de batalla.</p>
                
                <div class="category-grid-outline">
                    <button class="btn-outline-cyan" onclick="loadQuiz('A')">JOCS OLIMPICS</button>
                    <button class="btn-outline-cyan" onclick="loadQuiz('B')">MON GAMER</button>
                </div>
            </div>
        </section>

        <section id="screen-game">
            <div class="glass-card game-box">
                <div class="game-header">
                    <span id="timer" class="timer-text">15"</span>
                    <h3 id="category-title">PREGUNTA VIDEOJOCS</h3>
                    <span id="progress" class="step-counter">02/06</span>
                </div>

                <h2 id="question-text">Aquí va la pregunta del quiz?</h2>

                <div id="options-container" class="options-grid">
                    <button class="option-btn" onclick="selectOption('A')">
                        <span class="letter">A</span>
                        <span class="text">Resposta 1</span>
                    </button>
                    <button class="option-btn" onclick="selectOption('B')">
                        <span class="letter">B</span>
                        <span class="text">Resposta 2</span>
                    </button>
                    <button class="option-btn" onclick="selectOption('C')">
                        <span class="letter">C</span>
                        <span class="text">Resposta 3</span>
                    </button>
                </div>
            </div>
        </section>

        <section id="screen-results">
            <div class="glass-card result-card">
                <h2>Missió Completada</h2>
                <div class="score-box">
                    <span id="final-score">0</span>
                    <p>Encerts Totals</p>
                </div>
                <div class="result-actions">
                    <button class="btn-main" onclick="restart()">REINTENTAR PARTIDA</button>
                    <button class="btn-outline" onclick="exit()">TANCAR SISTEMA</button>
                </div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>

</html>
