<!DOCTYPE html>
<html lang="ca">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sports Arena |Quiz</title>
    <link rel="icon" href="img/favicon.png">
    <link rel="stylesheet" href="css/styles.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="bg-glow"></div>
    <div class="bg-grid"></div>

    <main class="main-wrapper">
        <section id="screen-welcome" class="active">
            <div class="glass-card">
                <h1>SPORTS<span> ARENA</span></h1>
                <p>Domina la pista i els eSports en el duel definitiu.</p>

                <div class="input-container">
                    <input type="text" id="username" placeholder="El teu nom de jugador..." autocomplete="off">
                </div>
                <button class="btn-main" onclick="checkUser()">INICIAR SESSIÓ</button>
            </div>
        </section>

        <section id="screen-select">
            <div class="glass-card">
                <h2 id="welcome-user">Hola!</h2>
                <p>Selecciona el teu camp de batalla:</p>
                <div class="category-grid">
                    <button class="cat-card gold" onclick="loadQuiz('A')">
                        <div class="icon">🥇</div>
                        <span>Jocs Olímpics</span>
                    </button>
                    <button class="cat-card blue" onclick="loadQuiz('B')">
                        <div class="icon">🎮</div>
                        <span>Món Gamer</span>
                    </button>
                </div>
            </div>
        </section>

        <section id="screen-game">
            <div class="glass-card game-box">
                <div class="game-header">
                    <div class="timer-container">
                        <svg class="timer-svg" viewBox="0 0 40 40">
                            <circle class="timer-bg" cx="20" cy="20" r="18"></circle>
                            <circle class="timer-bar" cx="20" cy="20" r="18"></circle>
                        </svg>
                        <span id="timer">10</span>
                    </div>
                    <div id="progress" class="step-counter">01 / 03</div>
                </div>
                <h3 id="question-text">Preparant el repte...</h3>
                <div id="options-container" class="options-grid"></div>
            </div>
        </section>

        <section id="screen-results">
            <div class="glass-card result-card">
                <h2>Missió Completada</h2>
                <div class="score-box">
                    <span id="final-score">0</span>
                    <p>Encerts Totals</p>
                </div>
                <div class="result-actions">
                    <button class="btn-main" onclick="restart()">REINTENTAR PARTIDA</button>
                    <button class="btn-outline" onclick="exit()">TANCAR SISTEMA</button>
                </div>
            </div>
        </section>
    </main>

    <script src="js/app.js"></script>
</body>

</html>
